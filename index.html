<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="音読記録">
<title>音読記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;max-width:480px;margin:0 auto;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:12px 2px;font-size:12px;text-align:center;color:#888;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;}
.tab.on{color:#222;border-bottom-color:#222;font-weight:600;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.section-title{font-size:13px;color:#888;margin-bottom:12px;font-weight:600;}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.student-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.avatar{width:38px;height:38px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#1d4ed8;flex-shrink:0;}
.student-name{font-size:16px;font-weight:600;color:#222;}
.week-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wlabel{font-size:12px;color:#888;width:48px;flex-shrink:0;}
.counter{display:flex;align-items:center;gap:10px;}
.cnt-btn{width:30px;height:30px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;line-height:1;}
.cnt-val{font-size:16px;font-weight:600;min-width:22px;text-align:center;color:#222;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;}
.badge-ok{background:#dcfce7;color:#166534;}
.badge-ng{background:#f3f4f6;color:#6b7280;}
.month-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #f0f0f0;margin-top:6px;}
.month-num{font-size:20px;font-weight:700;color:#222;}
.month-sub{font-size:12px;color:#888;}
.msg-box{background:#fff;border-radius:14px;padding:16px;font-size:14px;line-height:1.8;color:#222;white-space:pre-wrap;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.copy-btn{margin-top:10px;width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#333;}
.month-select{font-size:14px;padding:6px 10px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#222;margin-bottom:14px;width:100%;}
.settings-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.settings-row input[type=text]{flex:1;font-size:15px;padding:8px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#222;}
.del-btn{width:30px;height:30px;border-radius:50%;border:1px solid #ddd;background:none;cursor:pointer;font-size:16px;color:#888;}
.add-btn{width:100%;padding:10px;border:1.5px dashed #ddd;border-radius:10px;background:none;cursor:pointer;font-size:14px;color:#888;margin-top:4px;}
.save-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#222;cursor:pointer;font-size:15px;font-weight:600;color:#fff;margin-top:14px;}
.cumul-table{width:100%;border-collapse:collapse;font-size:13px;}
.cumul-table th{background:#f5f5f5;padding:8px 6px;text-align:center;font-weight:600;color:#555;border-bottom:1px solid #e0e0e0;}
.cumul-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0f0;color:#222;}
.bar-wrap{background:#f0f0f0;border-radius:6px;height:10px;width:100%;margin-top:4px;}
.bar-fill{background:#60a5fa;border-radius:6px;height:10px;}
.chart-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
</style>
</head>
<body>
<div class="tab-bar">
  <button class="tab on" onclick="showScreen('record',this)">記録</button>
  <button class="tab" onclick="showScreen('message',this)">メッセージ</button>
  <button class="tab" onclick="showScreen('cumul',this)">累計</button>
  <button class="tab" onclick="showScreen('settings',this)">設定</button>
</div>
<div id="screen-record" class="screen active"></div>
<div id="screen-message" class="screen">
  <p class="section-title">月末 — 保護者向けメッセージ</p>
  <select class="month-select" id="msg-month-sel" onchange="renderMessage()"></select>
  <div class="msg-box" id="msg-output"></div>
  <button class="copy-btn" onclick="copyMsg()">コピーする</button>
</div>
<div id="screen-cumul" class="screen">
  <p class="section-title">累計記録</p>
  <div id="cumul-content"></div>
</div>
<div id="screen-settings" class="screen">
  <p class="section-title">生徒名の編集</p>
  <div id="name-list"></div>
  <button class="add-btn" onclick="addStudent()">+ 生徒を追加</button>
  <button class="save-btn" onclick="saveNames()">保存する</button>
</div>
<script>
var WEEKS=['第1週','第2週','第3週','第4週','第5週'];
var MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var THRESHOLD=5;
var students=JSON.parse(localStorage.getItem('students')||'["あかり","けんた","まさき","しゅうや","そう","はやと"]');
var data=JSON.parse(localStorage.getItem('data')||'{}');

function save(){
  localStorage.setItem('students',JSON.stringify(students));
  localStorage.setItem('data',JSON.stringify(data));
}

function currentMonth(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function monthLabel(m){
  var parts=m.split('-');
  return parts[0]+'年'+MONTHS[parseInt(parts[1])-1];
}

function weeksInMonth(m){
  var parts=m.split('-');
  var y=parseInt(parts[0]);
  var mo=parseInt(parts[1]);
  var first=new Date(y,mo-1,1).getDay();
  var days=new Date(y,mo,0).getDate();
  return Math.ceil((first+days)/7);
}

function getVal(name,month,week){
  return data[name+'|'+month+'|'+week]||0;
}

function setVal(name,month,week,v){
  data[name+'|'+month+'|'+week]=Math.max(0,v);
  save();
  renderRecord();
}

function monthTotal(name,month){
  var t=0;
  var w=weeksInMonth(month);
  for(var i=0;i<w;i++) t+=getVal(name,month,i);
  return t;
}

function allMonths(){
  var keys=Object.keys(data);
  var ms={};
  for(var i=0;i<keys.length;i++){
    var p=keys[i].split('|');
    if(p.length===3) ms[p[1]]=true;
  }
  ms[currentMonth()]=true;
  return Object.keys(ms).sort();
}

function cumulTotal(name){
  var months=allMonths();
  var t=0;
  for(var i=0;i<months.length;i++) t+=monthTotal(name,months[i]);
  return t;
}

function renderRecord(){
  var month=currentMonth();
  var weeks=weeksInMonth(month);
  var el=document.getElementById('screen-record');
  el.innerHTML='<p class="section-title">'+monthLabel(month)+'の記録</p>';
  for(var si=0;si<students.length;si++){
    var name=students[si];
    var total=monthTotal(name,month);
    var html='<div class="card">';
    html+='<div class="student-header"><div class="avatar">'+name.charAt(0)+'</div>';
    html+='<div class="student-name">'+name+'</div></div>';
    for(var w=0;w<weeks;w++){
      var v=getVal(name,month,w);
      var ok=v>=THRESHOLD;
      var nn=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+='<div class="week-row">';
      html+='<span class="wlabel">'+WEEKS[w]+'</span>';
      html+='<div class="counter">';
      html+='<button class="cnt-btn" onclick="setVal(\''+nn+'\',\''+month+'\','+w+','+(v-1)+')">-</button>';
      html+='<span class="cnt-val">'+v+'</span>';
      html+='<button class="cnt-btn" onclick="setVal(\''+nn+'\',\''+month+'\','+w+','+(v+1)+')">+</button>';
      html+='</div>';
      html+='<span class="badge '+(ok?'badge-ok':'badge-ng')+'">'+(ok?'飴あり':'-')+'</span>';
      html+='</div>';
    }
    html+='<div class="month-total">';
    html+='<div><div class="month-sub">今月の合計</div>';
    html+='<div class="month-num">'+total+' 回</div></div></div></div>';
    el.innerHTML+=html;
  }
}

function renderMessageScreen(){
  var sel=document.getElementById('msg-month-sel');
  var now=new Date();
  var months=[];
  for(var i=0;i<6;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  var opts='';
  for(var i=0;i<months.length;i++){
    opts+='<option value="'+months[i]+'">'+monthLabel(months[i])+'</option>';
  }
  sel.innerHTML=opts;
  renderMessage();
}

function renderMessage(){
  var sel=document.getElementById('msg-month-sel').value;
  var label=monthLabel(sel);
  var lines='【'+label+'の音読チャレンジ結果】\n\nみなさん、今月もよくがんばりました！\n\n';
  for(var i=0;i<students.length;i++){
    var name=students[i];
    var total=monthTotal(name,sel);
    var star=total>=20?'⭐⭐':total>=10?'⭐':'  ';
    lines+=star+' '+name+' さん：'+total+' 回\n';
  }
  var grand=0;
  for(var i=0;i<students.length;i++) grand+=monthTotal(students[i],sel);
  lines+='\nみんなの合計：'+grand+' 回\n\n引き続き毎日の音読をよろしくお願いします！';
  document.getElementById('msg-output').textContent=lines;
}

function copyMsg(){
  var text=document.getElementById('msg-output').textContent;
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.querySelector('.copy-btn');
    btn.textContent='コピーしました！';
    setTimeout(function(){btn.textContent='コピーする';},1500);
  });
}

function renderCumul(){
  var months=allMonths();
  var el=document.getElementById('cumul-content');
  var maxVal=1;
  for(var i=0;i<students.length;i++){
    var t=cumulTotal(students[i]);
    if(t>maxVal) maxVal=t;
  }
  var sorted=students.slice().sort(function(a,b){return cumulTotal(b)-cumulTotal(a);});
  var html='<div class="chart-card"><p class="section-title">累計ランキング</p>';
  for(var i=0;i<sorted.length;i++){
    var name=sorted[i];
    var total=cumulTotal(name);
    var pct=Math.round(total/maxVal*100);
    var medal=i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
    html+='<div style="margin-bottom:14px;">';
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    html+='<span style="font-size:14px;font-weight:600;">'+medal+name+'</span>';
    html+='<span style="font-size:14px;font-weight:700;color:#1d4ed8;">'+total+' 回</span></div>';
    html+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="chart-card"><p class="section-title">月別一覧</p>';
  html+='<div style="overflow-x:auto;"><table class="cumul-table"><tr><th>名前</th>';
  for(var i=0;i<months.length;i++){
    html+='<th>'+monthLabel(months[i])+'</th>';
  }
  html+='<th>累計</th></tr>';
  for(var si=0;si<students.length;si++){
    var name=students[si];
    html+='<tr><td style="text-align:left;font-weight:600;">'+name+'</td>';
    for(var i=0;i<months.length;i++){
      html+='<td>'+monthTotal(name,months[i])+'</td>';
    }
    html+='<td style="color:#1d4ed8;font-weight:700;">'+cumulTotal(name)+'</td></tr>';
  }
  html+='<tr style="background:#fff9e6;"><td style="text-align:left;font-weight:700;">合計</td>';
  for(var i=0;i<months.length;i++){
    var t=0;
    for(var si=0;si<students.length;si++) t+=monthTotal(students[si],months[i]);
    html+='<td style="font-weight:700;">'+t+'</td>';
  }
  var grand=0;
  for(var si=0;si<students.length;si++) grand+=cumulTotal(students[si]);
  html+='<td style="font-weight:700;">'+grand+'</td></tr>';
  html+='</table></div></div>';
  el.innerHTML=html;
}

function renderSettings(){
  var html='';
  for(var i=0;i<students.length;i++){
    html+='<div class="settings-row"><input type="text" value="'+students[i]+'" id="sname-'+i+'" />';
    html+='<button class="del-btn" onclick="removeStudent('+i+')">x</button></div>';
  }
  document.getElementById('name-list').innerHTML=html;
}

function addStudent(){students.push('新しい生徒');renderSettings();}

function removeStudent(i){students.splice(i,1);renderSettings();}

function saveNames(){
  var inputs=document.querySelectorAll('[id^="sname-"]');
  var newStudents=[];
  for(var i=0;i<inputs.length;i++){
    var v=inputs[i].value.trim();
    if(v) newStudents.push(v);
  }
  students=newStudents;
  save();renderSettings();renderRecord();
  var btn=document.querySelector('.save-btn');
  btn.textContent='保存しました！';
  setTimeout(function(){btn.textContent='保存する';},1500);
}

function showScreen(name,tabEl){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  document.getElementById('screen-'+name).classList.add('active');
  tabEl.classList.add('on');
  if(name==='message') renderMessageScreen();
  if(name==='settings') renderSettings();
  if(name==='cumul') renderCumul();
}

renderRecord();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="音読記録">
<title>音読記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;max-width:480px;margin:0 auto;}
.top-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:20;overflow-x:auto;}
.class-tab{flex-shrink:0;padding:12px 16px;font-size:13px;color:#888;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;}
.class-tab.on{color:#222;border-bottom-color:#222;font-weight:700;}
.tab-bar{display:flex;background:#f9f9f9;border-bottom:1px solid #e0e0e0;}
.tab{flex:1;padding:10px 2px;font-size:11px;text-align:center;color:#888;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;}
.tab.on{color:#222;border-bottom-color:#222;font-weight:600;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.student-name{font-size:16px;font-weight:600;color:#222;margin-bottom:12px;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-header span{font-size:10px;text-align:center;color:#888;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.cal-day{min-height:38px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid #eee;background:#fafafa;}
.cal-day.empty{background:none;border:none;cursor:default;}
.cal-day.today{border-color:#60a5fa;border-width:2px;}
.day-num{font-size:10px;color:#888;}
.dots{display:flex;gap:2px;margin-top:2px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-r{background:#60a5fa;}
.has-read{background:#eff6ff;}
.legend{display:flex;gap:12px;margin-bottom:12px;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:#666;}
.ld{width:8px;height:8px;border-radius:50%;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.month-nav button{width:32px;height:32px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:18px;color:#333;}
.month-nav span{font-size:15px;font-weight:600;color:#222;}
.summary-row{display:flex;gap:8px;margin-top:8px;}
.sbox{flex:1;background:#f5f5f5;border-radius:10px;padding:8px;text-align:center;}
.sbox .val{font-size:18px;font-weight:700;color:#222;}
.sbox .lbl{font-size:10px;color:#888;}
.ame-badge{background:#fef9c3;color:#854d0e;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px;display:inline-block;}
.anime-input-row{display:flex;align-items:center;justify-content:space-between;background:#fffbeb;border-radius:10px;padding:10px 12px;margin-top:8px;}
.anime-input-row label{font-size:13px;color:#854d0e;font-weight:600;}
.anime-input-row input{width:60px;font-size:16px;font-weight:700;text-align:center;border:1px solid #f59e0b;border-radius:8px;padding:4px;color:#222;}
.anime-save-btn{background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.season-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.sname{font-size:15px;font-weight:600;margin-bottom:10px;color:#222;}
.stitle{font-size:12px;font-weight:600;color:#555;margin:10px 0 6px;}
.srow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.syen{font-weight:700;color:#1d4ed8;}
.carry{background:#fffbeb;border-radius:8px;padding:6px 10px;font-size:12px;color:#854d0e;margin:6px 0;}
.msg-box{background:#fff;border-radius:14px;padding:16px;font-size:14px;line-height:1.8;color:#222;white-space:pre-wrap;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.copy-btn{margin-top:10px;width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#333;}
.msel{font-size:14px;padding:6px 10px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#222;margin-bottom:14px;width:100%;}
.srow2{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.srow2 input{flex:1;font-size:15px;padding:8px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#222;}
.dbtn{width:30px;height:30px;border-radius:50%;border:1px solid #ddd;background:none;cursor:pointer;color:#888;}
.add-btn{width:100%;padding:10px;border:1.5px dashed #ddd;border-radius:10px;background:none;cursor:pointer;font-size:14px;color:#888;margin-top:4px;}
.save-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#222;cursor:pointer;font-size:15px;font-weight:600;color:#fff;margin-top:14px;}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:100;}
.modal-bg.open{display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:18px;padding:24px;width:290px;}
.mtitle{font-size:15px;font-weight:600;text-align:center;margin-bottom:6px;color:#222;}
.mdate{font-size:13px;color:#888;text-align:center;margin-bottom:16px;}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.mrow label{font-size:14px;color:#333;}
.mrow input[type=checkbox]{width:22px;height:22px;accent-color:#60a5fa;}
.mclose{width:100%;padding:10px;border-radius:10px;border:none;background:#222;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;}
</style>
</head>
<body>
<div class="top-bar" id="ctabs"></div>
<div class="tab-bar">
  <button class="tab on" onclick="showSub('cal',this)">カレンダー</button>
  <button class="tab" onclick="showSub('season',this)">シーズン</button>
  <button class="tab" onclick="showSub('msg',this)">メッセージ</button>
  <button class="tab" onclick="showSub('cfg',this)">設定</button>
</div>
<div id="s-cal" class="screen active"></div>
<div id="s-season" class="screen"></div>
<div id="s-msg" class="screen">
  <p style="font-size:13px;color:#888;margin-bottom:12px;font-weight:600;">保護者向けメッセージ</p>
  <select class="msel" id="msel" onchange="renderMsg()"></select>
  <div class="msg-box" id="msgout"></div>
  <button class="copy-btn" onclick="copyMsg()">コピーする</button>
</div>
<div id="s-cfg" class="screen">
  <p style="font-size:13px;color:#888;margin-bottom:12px;font-weight:600;" id="cfg-title">設定</p>
  <div id="namelist"></div>
  <button class="add-btn" onclick="addSt()">+ 生徒を追加</button>
  <button class="save-btn" onclick="saveNames()">保存する</button>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="mtitle" id="m-name"></div>
    <div class="mdate" id="m-date"></div>
    <div class="mrow"><label>音読した</label><input type="checkbox" id="m-read"></div>
    <button class="mclose" onclick="closeModal()">保存して閉じる</button>
  </div>
</div>
<script>
var MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var DN=['日','月','火','水','木','金','土'];
var SS=[{n:'春',m:[3,4,5],i:'🌸'},{n:'夏',m:[6,7,8],i:'☀️'},{n:'秋',m:[9,10,11],i:'🍂'},{n:'冬',m:[12,1,2],i:'⛄️'}];
var CL=[
  {id:'p3',name:'P3教室',anime:true,ame:true,st:['あかり','けんた','まさき','しゅうや','そう','はやと']},
  {id:'p4',name:'P4オンライン',anime:true,ame:false,st:['岡埜朱里','石母田咲希','神戸はると','神田ともあき']}
];
var DAT={};
var ci=0,cy=new Date().getFullYear(),cm=new Date().getMonth()+1,csub='cal',mi={};
try{var tmp=localStorage.getItem('oc');if(tmp)CL=JSON.parse(tmp);}catch(e){}
try{var tmp2=localStorage.getItem('od');if(tmp2)DAT=JSON.parse(tmp2);}catch(e){}
function sv(){try{localStorage.setItem('oc',JSON.stringify(CL));localStorage.setItem('od',JSON.stringify(DAT));}catch(e){}}
function pad(n){return String(n).padStart(2,'0');}
function gk(id,n,y,m,d){return id+'|'+n+'|'+y+'-'+pad(m)+'-'+pad(d);}
function gd(id,n,y,m,d){return DAT[gk(id,n,y,m,d)]||{r:false};}
function sd2(id,n,y,m,d,r){DAT[gk(id,n,y,m,d)]={r:r};sv();}
function gak(id,n,y,m){return 'anime|'+id+'|'+n+'|'+y+'-'+pad(m);}
function getAnime(id,n,y,m){return DAT[gak(id,n,y,m)]||0;}
function setAnime(id,n,y,m,v){DAT[gak(id,n,y,m)]=parseInt(v)||0;sv();}
function dim(y,m){return new Date(y,m,0).getDate();}
function fd(y,m){return new Date(y,m-1,1).getDay();}
function mrc(id,n,y,m){var c=0,D=dim(y,m);for(var d=1;d<=D;d++)if(gd(id,n,y,m,d).r)c++;return c;}
function wrc(id,n,y,m){
  var now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());
  var c=0;
  for(var i=0;i<7;i++){var dd=new Date(ws);dd.setDate(ws.getDate()+i);if(dd.getFullYear()===y&&dd.getMonth()+1===m&&gd(id,n,y,m,dd.getDate()).r)c++;}
  return c;
}
function renderTabs(){
  var el=document.getElementById('ctabs');el.innerHTML='';
  for(var i=0;i<CL.length;i++){
    (function(idx){
      var b=document.createElement('button');
      b.className='class-tab'+(idx===ci?' on':'');
      b.textContent=CL[idx].name;
      b.onclick=function(){ci=idx;renderTabs();renderSub2();};
      el.appendChild(b);
    })(i);
  }
}
function renderCal(){
  var cl=CL[ci],y=cy,m=cm,now=new Date();
  var h='<div class="month-nav"><button onclick="pm()">&#8249;</button><span>'+y+'年'+MN[m-1]+'</span><button onclick="nm()">&#8250;</button></div>';
  h+='<div class="legend"><div class="li"><div class="ld" style="background:#60a5fa"></div>音読</div></div>';
  for(var si=0;si<cl.st.length;si++){
    var name=cl.st[si];
    var rc=mrc(cl.id,name,y,m);
    var ac=cl.anime?getAnime(cl.id,name,y,m):0;
    var wc=wrc(cl.id,name,y,m);
    h+='<div class="card">';
    if(cl.ame&&wc>=5)h+='<div class="ame-badge">🍬 今週5回達成！飴あり</div>';
    h+='<div class="student-name">'+name+'</div>';
    h+='<div class="cal-header">';
    for(var dw=0;dw<7;dw++)h+='<span>'+DN[dw]+'</span>';
    h+='</div><div class="cal-grid">';
    var f=fd(y,m),td=dim(y,m);
    for(var b=0;b<f;b++)h+='<div class="cal-day empty"></div>';
    for(var d=1;d<=td;d++){
      var dd=gd(cl.id,name,y,m,d);
      var iT=now.getFullYear()===y&&now.getMonth()+1===m&&now.getDate()===d;
      var dc='cal-day'+(iT?' today':'')+(dd.r?' has-read':'');
      var nn=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+='<div class="'+dc+'" onclick="om(\''+nn+'\','+y+','+m+','+d+')">';
      h+='<span class="day-num">'+d+'</span><div class="dots">';
      if(dd.r)h+='<div class="dot dot-r"></div>';
      h+='</div></div>';
    }
    h+='</div>';
    h+='<div class="summary-row">';
    h+='<div class="sbox"><div class="val">'+rc+'</div><div class="lbl">音読回数</div></div>';
    if(cl.anime)h+='<div class="sbox"><div class="val">'+ac+'</div><div class="lbl">アニメ(ゴールド★)</div></div>';
    h+='<div class="sbox"><div class="val">'+(rc+ac)*5+'pt</div><div class="lbl">今月の積立</div></div>';
    h+='</div>';
    if(cl.anime){
      var nn2=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+='<div class="anime-input-row">';
      h+='<label>アニメ(ゴールド★)回数</label>';
      h+='<input type="number" min="0" max="31" value="'+ac+'" id="ai-'+si+'">';
      h+='<button class="anime-save-btn" onclick="saveAnime(\''+nn2+'\','+y+','+m+','+si+')">保存</button>';
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById('s-cal').innerHTML=h;
}
function saveAnime(name,y,m,si){
  var cl=CL[ci];
  var v=document.getElementById('ai-'+si).value;
  setAnime(cl.id,name,y,m,v);
  renderCal();
}
function renderSeason(){
  var cl=CL[ci],now=new Date(),ty=now.getFullYear();
  var h='';
  for(var si=0;si<cl.st.length;si++){
    var name=cl.st[si];
    h+='<div class="season-card"><div class="sname">'+name+'</div>';
    for(var sei=0;sei<SS.length;sei++){
      var s=SS[sei];var tot=0;
      h+='<div class="stitle">'+s.i+' '+s.n+'シーズン</div>';
      for(var mi2=0;mi2<s.m.length;mi2++){
        var mo=s.m[mi2],yr=ty;
        if(mo>=10&&now.getMonth()+1<=2)yr=ty-1;
        var rc=mrc(cl.id,name,yr,mo);
        var ac=cl.anime?getAnime(cl.id,name,yr,mo):0;
        var pt=(rc+ac)*5;
        tot+=pt;
        h+='<div class="srow"><span>'+MN[mo-1]+'</span><span>音読'+rc+'回'+(cl.anime?' アニメ'+ac+'回':'')+'</span><span class="syen">'+pt+'pt</span></div>';
      }
      var units=[1000,700,500,200],card=0;
      for(var ui=0;ui<units.length;ui++)while(tot-card>=units[ui])card+=units[ui];
      h+='<div class="srow" style="font-weight:600"><span>合計</span><span></span><span class="syen">'+tot+'pt</span></div>';
      h+='<div class="carry">図書カード '+card+'pt分 ／ 繰越 '+(tot-card)+'pt</div>';
    }
    h+='</div>';
  }
  document.getElementById('s-season').innerHTML=h;
}
function renderMsgScreen(){
  var now=new Date(),sel=document.getElementById('msel'),opts='';
  for(var i=0;i<6;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var v=d.getFullYear()+'-'+pad(d.getMonth()+1);
    opts+='<option value="'+v+'">'+d.getFullYear()+'年'+MN[d.getMonth()]+'</option>';
  }
  sel.innerHTML=opts;renderMsg();
}
function renderMsg(){
  var cl=CL[ci],v=document.getElementById('msel').value,p=v.split('-'),y=parseInt(p[0]),m=parseInt(p[1]);
  var lines='【'+y+'年'+MN[m-1]+'の音読チャレンジ結果】\n\nみなさん、今月もよくがんばりました！\n\n';
  for(var i=0;i<cl.st.length;i++){
    var n=cl.st[i],rc=mrc(cl.id,n,y,m),ac=cl.anime?getAnime(cl.id,n,y,m):0,pt=(rc+ac)*5;
    lines+='⭐ '+n+' さん：音読'+rc+'回'+(cl.anime?' アニメ'+ac+'回':'')+' → '+pt+'ポイント積立\n';
  }
  lines+='\nシーズン末に図書カードでお渡しします🎁\n引き続きよろしくお願いします🎵';
  document.getElementById('msgout').textContent=lines;
}
function copyMsg(){
  navigator.clipboard.writeText(document.getElementById('msgout').textContent).then(function(){
    var b=document.querySelector('.copy-btn');b.textContent='コピーしました！';setTimeout(function(){b.textContent='コピーする';},1500);
  });
}
function renderCfg(){
  var cl=CL[ci];
  document.getElementById('cfg-title').textContent=cl.name+' — 生徒名編集';
  var h='';
  for(var i=0;i<cl.st.length;i++)
    h+='<div class="srow2"><input type="text" value="'+cl.st[i]+'" id="sn-'+i+'"><button class="dbtn" onclick="delSt('+i+')">x</button></div>';
  document.getElementById('namelist').innerHTML=h;
}
function addSt(){CL[ci].st.push('新しい生徒');renderCfg();}
function delSt(i){CL[ci].st.splice(i,1);renderCfg();}
function saveNames(){
  var inputs=document.querySelectorAll('[id^="sn-"]'),arr=[];
  for(var i=0;i<inputs.length;i++){var v=inputs[i].value.trim();if(v)arr.push(v);}
  CL[ci].st=arr;sv();renderCfg();renderCal();
  var b=document.querySelector('.save-btn');b.textContent='保存しました！';setTimeout(function(){b.textContent='保存する';},1500);
}
function om(name,y,m,d){
  var cl=CL[ci],dd=gd(cl.id,name,y,m,d);
  mi={name:name,y:y,m:m,d:d};
  document.getElementById('m-name').textContent=name;
  document.getElementById('m-date').textContent=y+'年'+MN[m-1]+d+'日';
  document.getElementById('m-read').checked=dd.r;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  var cl=CL[ci],r=document.getElementById('m-read').checked;
  sd2(cl.id,mi.name,mi.y,mi.m,mi.d,r);
  document.getElementById('modal').classList.remove('open');
  renderCal();
}
function pm(){cm--;if(cm<1){cm=12;cy--;}renderCal();}
function nm(){cm++;if(cm>12){cm=1;cy++;}renderCal();}
function showSub(name,tabEl){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('s-'+name).classList.add('active');
  tabEl.classList.add('on');csub=name;renderSub2();
}
function renderSub2(){
  if(csub==='cal')renderCal();
  else if(csub==='season')renderSeason();
  else if(csub==='msg')renderMsgScreen();
  else if(csub==='cfg')renderCfg();
}
renderTabs();
renderCal();
</script>
</body>
</html>
